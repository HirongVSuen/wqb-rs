# === 基础风格 ===
edition = "2024"                 # 必须与 Cargo.toml 中的 edition 保持一致
max_width = 100                  # 单行最大字符数（100 是宽屏时代的黄金标准）
hard_tabs = false                # 使用空格而不是 Tab
tab_spaces = 4                   # 4 个空格缩进
newline_style = "Unix"           # 统一使用 LF 换行符（避免 Windows 下出现 CRLF）

# === 布局优化 (让代码更紧凑) ===
use_small_heuristics = "Max"     # 关键配置：允许更长的单行代码，减少垂直空白
fn_params_layout = "Compressed"  # 函数参数紧凑布局：参数尽量挤在一行，而不是频繁换行
#struct_field_align_threshold = 20 # 结构体字段对齐阈值：如果字段名长度差小于20，则对齐
#enum_discrim_align_threshold = 20 # 枚举判别值对齐阈值：同上，视觉更整齐

# === 导入与整理 ===
reorder_imports = true           # 自动对 use 语句排序（按字母顺序）
#imports_granularity = "Crate"    # 合并导入：将来自同一个 crate 的导入合并为一行
merge_derives = true             # 合并 derive 宏：#[derive(A)] #[derive(B)] -> #[derive(A, B)]

# === 细节与注释 ===
#wrap_comments = true             # 自动换行长注释（保持文档整洁）
#format_code_in_doc_comments = true # 格式化文档注释中的代码块
#use_field_init_shorthand = true  # 使用字段初始化简写：User { name } 而不是 User { name: name }
#trailing_comma = "Vertical"      # 多行列表尾部强制加逗号（利于 Git diff）
